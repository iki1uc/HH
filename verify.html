<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>verify – Ghost Monitor</title>
<style>
body { background:#000; color:#0f0; font-family:Consolas, monospace; padding:20px; }
.fail { color:#f33; }
.error { color:#ff0; }
.ok { color:#3f3; }
.verify { color:#6cf; }
</style>
<script src="GHOST.js"></script>
</head>
<body>

<h1>verify – Ghost Monitor</h1>
<pre id="out"></pre>

<script>
const result = GHOST.scan("verify.html");

document.getElementById("out").innerHTML = `
Ghost‑Level: ${result.ghostLevel}
Datei: ${result.file}
Status: <span class="${result.status.toLowerCase()}">${result.status}</span>
Repair: ${result.repair}
`;
</script>

</body>
</html>
