<script>
(function () {

    const ua = navigator.userAgent || navigator.vendor || window.opera;

    // PX – echte Mobile/Tablet Erkennung (harte Version)
    const isPX =
        /iPhone|iPad|iPod/i.test(ua) ||                     // Apple Mobile
        (/Android/i.test(ua) && /Mobile/i.test(ua)) ||     // Android Mobile
        (/Android/i.test(ua) && !/Mobile/i.test(ua)) ||    // Android Tablet
        /Tablet|Tab/i.test(ua);                            // generische Tablets

    // PQ/PR – Desktop/Laptop
    const isDesktop = !isPX;

    let deviceType = "";
    let deviceSymbol = "";
    let deviceRoute = "";

    // PX → viPIio (nur echte Mobile)
    if (isPX) {
        deviceType = "PX";
        deviceSymbol = "📱";
        deviceRoute = "viPIio";

        window.location.replace("https://iki1uc.github.io/viPIio/");
        return;
    }

    // PQ → Laptop (Desktop + Touch)
    if (isDesktop && navigator.maxTouchPoints > 0) {
        deviceType = "PQ";
        deviceSymbol = "💻";
        deviceRoute = "HH";
    }

    // PR → PC (Desktop ohne Touch)
    if (isDesktop && navigator.maxTouchPoints === 0) {
        deviceType = "PR";
        deviceSymbol = "🖥️";
        deviceRoute = "HH";
    }

    // HH‑Panel aktualisieren
    const hhPanel = document.getElementById("hh-panel");
    if (hhPanel) {
        hhPanel.innerHTML = `
            <h2>HH – Host‑Hub Panel</h2>
            <div><b>Gerät:</b> ${deviceType} ${deviceSymbol}</div>
            <div><b>Route:</b> ${deviceRoute}</div>
        `;
    }

})();
</script>
