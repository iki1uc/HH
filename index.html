<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HH – Host Hub Stargate + Ghost L2</title>

<style>
body {
    background:#000;
    color:#0f0;
    font-family:Consolas, monospace;
    padding:20px;
    overflow:hidden;
}

/* Stargate */
#gate {
    position:absolute;
    right:0;
    top:0;
    width:50vw;
    height:100vh;
    border-left:4px solid #0ff;
    background:radial-gradient(circle at center, #444, #000);
    animation:spinGate 12s linear infinite;
}
@keyframes spinGate { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }

#vortex {
    position:absolute;
    right:0;
    top:0;
    width:50vw;
    height:100vh;
    background:conic-gradient(from 180deg, #0ff, #000);
    opacity:0.35;
    animation:vortexSpin 5s linear infinite;
}
@keyframes vortexSpin { from {transform:rotate(0deg);} to {transform:rotate(-360deg);} }

#halo {
    position:absolute;
    right:0;
    top:8vh;
    width:50vw;
    height:12vh;
    background:radial-gradient(circle, rgba(255,255,255,0.5), transparent);
}

/* GEO + Effekt Container */
#geoBox {
    position:absolute;
    left:20px;
    top:80px;
    width:40vw;
    height:40vh;
    background:#111;
    border:2px solid #0f0;
    border-radius:10px;
    overflow:hidden;
    padding:10px;
}

#effBox {
    position:absolute;
    left:20px;
    top:420px;
    width:40vw;
    height:25vh;
    background:#111;
    border:2px solid #0ff;
    border-radius:10px;
    overflow:hidden;
    padding:10px;
}

/* GEO Doppel-Ring */
.geoDot {
    width:10px;
    height:10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
    animation:pulseDot 2s infinite ease-in-out;
}
@keyframes pulseDot {
    0% { transform:scale(1); opacity:0.4; }
    50% { transform:scale(1.8); opacity:1; }
    100% { transform:scale(1); opacity:0.4; }
}

/* GEO Grid Matrix */
.gridCell {
    width:22%;
    height:22%;
    background:#222;
    border:1px solid #0f0;
    float:left;
    margin:1%;
    animation:gridPulse 3s infinite ease-in-out;
}
@keyframes gridPulse {
    0% { opacity:0.3; }
    50% { opacity:1; }
    100% { opacity:0.3; }
}

/* Ghost Points */
.ghostPoint {
    width:8px;
    height:8px;
    background:#0ff;
    border-radius:50%;
    position:absolute;
    opacity:0.5;
    animation:ghostMove 4s infinite linear;
}
@keyframes ghostMove {
    0% { transform:translateY(0px); }
    50% { transform:translateY(-20px); }
    100% { transform:translateY(0px); }
}
