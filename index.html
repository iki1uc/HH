<!-- ⭐ GEO + Effekt Erweiterung -->
<div id="geoLayer"></div>
<div id="effLayer"></div>

<style>
#geoLayer {
    position:absolute;
    left:20px;
    top:120px;
    width:40vw;
    height:40vh;
    border:2px solid #0f0;
    border-radius:10px;
    background:#111;
    padding:10px;
    overflow:hidden;
}

.geoDot {
    width:10px;
    height:10px;
    background:#0f0;
    border-radius:50%;
    position:absolute;
    animation:pulseDot 2s infinite ease-in-out;
}

@keyframes pulseDot {
    0% { transform:scale(1); opacity:0.4; }
    50% { transform:scale(1.8); opacity:1; }
    100% { transform:scale(1); opacity:0.4; }
}

#effLayer {
    position:absolute;
    left:20px;
    top:420px;
    width:40vw;
    height:25vh;
    border:2px solid #0ff;
    border-radius:10px;
    background:#111;
    padding:10px;
    overflow:hidden;
}

.effLine {
    width:100%;
    height:4px;
    background:#0ff;
    margin:6px 0;
    animation:waveLine 1.4s infinite linear;
}

@keyframes waveLine {
    0% { transform:translateX(-20px); opacity:0.3; }
    50% { transform:translateX(20px); opacity:1; }
    100% { transform:translateX(-20px); opacity:0.3; }
}
</style>

<script>
// ⭐ GEO erzeugen
(function(){
    const geo = document.getElementById("geoLayer");
    const count = 48;
    const radius = 140;

    for(let i=0; i<count; i++){
        const dot = document.createElement("div");
        dot.className = "geoDot";

        const angle = (i / count) * Math.PI * 2;
        const x = Math.cos(angle)*radius + 200;
        const y = Math.sin(angle)*radius + 120;

        dot.style.left = x+"px";
        dot.style.top  = y+"px";

        geo.appendChild(dot);
    }
})();

// ⭐ Effekt erzeugen
(function(){
    const eff = document.getElementById("effLayer");
    for(let i=0; i<12; i++){
        const line = document.createElement("div");
        line.className = "effLine";
        line.style.animationDelay = (i * 0.1)+"s";
        eff.appendChild(line);
    }
})();
</script>
