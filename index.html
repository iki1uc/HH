<script>
function detectDevice() {
    const ua = navigator.userAgent;

    const isMobile =
        /iPhone|iPad|iPod|Android|Mobile|Phone/i.test(ua);

    if (isMobile) {
        // PX → viPIio
        window.location.href = "https://iki1uc.github.io/viPIio/";
    }
    // PQ & PR bleiben auf HH
}
detectDevice();
</script>
