<!-- RUN8 – Zusatzmodul für HH -->
<div class="block">
  <h2>RUN8 – Systemstatus</h2>
  <pre id="run8">RUN8 wird geladen…</pre>

  <button id="testBtn">Vector-Test PQ → PX</button>

  <h3>viPIio‑Bild</h3>
  <img src="https://iki1uc.github.io/viPIio/logo.png" style="width:200px; border:2px solid #00e0ff;">
</div>

<script type="module">
    import VEC from "./VEC.js";

    const FourULink = {
        contact() {
            return {
                PX: VEC.PX,
                PQ: VEC.PQ,
                PR: VEC.PR,
                channel: VEC.channel,
                time: Date.now()
            };
        },
        scan() {
            const c = this.contact();
            return {
                devices: {
                    PX: c.PX.id,
                    PQ: c.PQ.id,
                    PR: c.PR.id
                },
                channel: c.channel,
                timestamp: c.time
            };
        }
    };

    function RUN8() {
        const scan = FourULink.scan();

        document.getElementById("run8").textContent =
            "RUN8 aktiv\n" +
            "Channel: " + scan.channel + "\n" +
            "Geräte erkannt:\n" +
            "  PX (Apple):  " + scan.devices.PX + "\n" +
            "  PQ (Laptop): " + scan.devices.PQ + "\n" +
            "  PR (PC):     " + scan.devices.PR + "\n" +
            "Status: System verbunden";
    }

    RUN8();

    document.getElementById("testBtn").onclick = () => {
        const packet = VEC.send("PQ-LAPTOP", "PX-APPLE", "Hallo Apple");
        const result = VEC.recv(packet);

        document.getElementById("run8").textContent =
            "RUN8 aktiv\n" +
            "Vector-Test:\n" +
            JSON.stringify(result, null, 2);
    };
</script>
