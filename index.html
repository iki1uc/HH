<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HH – Host Hub</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas, monospace; padding:20px; }
h1 { color:#6cf; }
.panel {
    padding:15px;
    border:2px solid #333;
    border-radius:10px;
    background:#111;
    margin-top:20px;
}
</style>

<script src="RESPO.core.js"></script>
<script src="AXI.core.js"></script>
<script src="TEM.core.js"></script>
<script src="RUN8.core.js"></script>

</head>

<body>

<h1>HH – Host Hub</h1>

<div id="pipeline" class="panel">
    <h2>Pipeline‑Status</h2>
    <div id="tri"></div>
    <div id="respo"></div>
    <div id="axi"></div>
    <div id="tem"></div>
    <div id="run8"></div>
    <div id="connect"></div>
</div>

<script>
(async function () {

    const tria = await fetch("tria.json").then(r => r.json()).catch(() => null);
    const respo = await fetch("respo.json").then(r => r.json()).catch(() => null);
    const axi = await fetch("axi.json").then(r => r.json()).catch(() => null);
    const tem = await fetch("TEM.id.json").then(r => r.json()).catch(() => null);

    const triOK = !!tria;
    const respoOK = !!respo;
    const axiOK = !!axi;
    const temOK = !!tem;

    const run8OK = typeof RUN8 !== "undefined";

    document.getElementById("tri").innerHTML = `<b>TriAxiom:</b> ${triOK ? "geladen" : "fehlt"}`;
    document.getElementById("respo").innerHTML = `<b>RESPO:</b> ${respoOK ? "geladen" : "fehlt"}`;
    document.getElementById("axi").innerHTML = `<b>AXI:</b> ${axiOK ? "geladen" : "fehlt"}`;
    document.getElementById("tem").innerHTML = `<b>TEM:</b> ${temOK ? "aktiv" : "fehlt"}`;
    document.getElementById("run8").innerHTML = `<b>RUN8 Kernel:</b> ${run8OK ? "aktiv" : "fehlt"}`;

    const connected = triOK && respoOK && axiOK && temOK && run8OK;
    document.getElementById("connect").innerHTML = `<b>Pipeline:</b> ${connected ? "VERBUNDEN" : "NICHT VERBUNDEN"}`;

})();
</script>

</body>
</html>
