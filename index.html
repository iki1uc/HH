<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HH – Host Hub</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas, monospace; padding:20px; }
h1 { color:#6cf; }
.panel {
    padding:15px;
    border:2px solid #333;
    border-radius:10px;
    background:#111;
    margin-top:20px;
}
</style>

<!-- SYSTEM MODULES LADEN -->
<script src="VEC.js"></script>
<script src="start.vector"></script>
<script src="scan.language"></script>
<script src="load.room"></script>
<script src="run.tmp"></script>
<script src="ORT.scan"></script>
<script src="ATTACK.RUN"></script>
<script src="BEN.tmp"></script>
<script src="C.tmp"></script>
<script src="DA.tmp"></script>
<script src="NE.tmp"></script>
<script src="X.tmp"></script>
<script src="Z.tmp"></script>

<!-- DEVICE ROUTING -->
<script src="routing.js"></script>

</head>

<body>

<h1>HH – Host Hub</h1>

<div id="hh-panel" class="panel">
    <h2>Geräte‑Status</h2>
    <div id="hh-device"></div>
    <div id="hh-route"></div>
</div>

<div id="pipeline-dashboard" class="panel">
    <h2>Pipeline‑Status</h2>
    <div id="pipe-tria"></div>
    <div id="pipe-respo"></div>
    <div id="pipe-axi"></div>
    <div id="pipe-tem"></div>
    <div id="pipe-run8"></div>
    <div id="pipe-sym"></div>
    <div id="pipe-connect"></div>
</div>

<script>
(async function () {

    /* ---------------------------------------------------------
       PIPELINE LADEN
    --------------------------------------------------------- */

    const tria = await fetch("tria.json").then(r => r.json()).catch(() => null);
    const respo = await fetch("respo.json").then(r => r.json()).catch(() => null);
    const axi = await fetch("axi.json").then(r => r.json()).catch(() => null);
    const tem = await fetch("TEM.id.json").then(r => r.json()).catch(() => null);

    const run8Ready = typeof START_VECTOR !== "undefined";
    const symReady = typeof scanLanguage !== "undefined";

    const connected = tria && respo && axi ? true : false;

    document.getElementById("pipe-tria").innerHTML =
        `<b>TriAxiom:</b> ${tria ? "geladen" : "fehlt"}`;

    document.getElementById("pipe-respo").innerHTML =
        `<b>RESPO:</b> ${respo ? "geladen" : "fehlt"}`;

    document.getElementById("pipe-axi").innerHTML =
        `<b>AXI:</b> ${axi ? "geladen" : "fehlt"}`;

    document.getElementById("pipe-tem").innerHTML =
        `<b>TEM:</b> ${tem ? "Zeit‑Engine aktiv" : "nicht geladen"}`;

    document.getElementById("pipe-run8").innerHTML =
        `<b>RUN8 Kernel:</b> ${run8Ready ? "aktiv" : "inaktiv"}`;

    document.getElementById("pipe-sym").innerHTML =
        `<b>SYM Engine:</b> ${symReady ? "aktiv" : "Fehler"}`;

    document.getElementById("pipe-connect").innerHTML =
        `<b>Pipeline:</b> ${connected ? "VERBUNDEN" : "NICHT VERBUNDEN"}`;

})();
</script>

</body>
</html>
