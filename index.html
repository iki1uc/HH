<div id="hh-panel" style="padding:12px;border:2px solid #444;border-radius:8px;">
    <h2>HH – Host‑Hub Panel</h2>

    <div id="device-status"></div>
    <div id="vector-status"></div>
    <div id="vipiio-status"></div>
    <div id="run8-status"></div>
</div>

<script>
(function () {

    const ua = navigator.userAgent || navigator.vendor || window.opera;

    const isAppleMobile = /iPhone|iPad|iPod/i.test(ua);
    const isAndroidMobile = /Android/i.test(ua) && /Mobile/i.test(ua);
    const isTablet = /iPad|Tablet|Tab/i.test(ua);
    const isDesktop = !isAppleMobile && !isAndroidMobile && !isTablet;

    const deviceStatus = document.getElementById("device-status");
    const vectorStatus = document.getElementById("vector-status");
    const vipiioStatus = document.getElementById("vipiio-status");
    const run8Status = document.getElementById("run8-status");

    // PX – Mobile → viPIio
    if (isAppleMobile || isAndroidMobile || isTablet) {
        deviceStatus.innerHTML = "<b>PX – Mobile erkannt</b>";
        vipiioStatus.innerHTML = "viPIio: aktiv (Routing → Mobile)";
        run8Status.innerHTML = "RUN8‑Channel: bereit";
        vectorStatus.innerHTML = "Vector‑Empfang: möglich";

        // Weiterleitung
        window.location.replace("https://iki1uc.github.io/viPIio/");
        return;
    }

    // PQ / PR – Desktop → HH
    if (isDesktop) {
        deviceStatus.innerHTML = "<b>PQ/PR – Desktop erkannt</b>";
        vipiioStatus.innerHTML = "viPIio: deaktiviert (Routing → HH)";
        run8Status.innerHTML = "RUN8‑Channel: aktiv";
        vectorStatus.innerHTML = "Vector‑Senden: möglich";
    }

})();
</script>
