<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HH – Host Hub Stargate + Ghost Verify Repair</title>

<style>
body {
    background:#000;
    color:#0f0;
    font-family:Consolas, monospace;
    padding:20px;
    overflow:hidden;
}

/* Stargate */
#gate {
    position:absolute;
    right:0;
    top:0;
    width:50vw;
    height:100vh;
    border-left:3px solid #6cf;
    background:radial-gradient(circle at center, #333, #000);
    animation:spinGate 20s linear infinite;
}
@keyframes spinGate { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }

/* Vortex */
#vortex {
    position:absolute;
    right:0;
    top:0;
    width:50vw;
    height:100vh;
    background:conic-gradient(from 180deg, #6cf, #000);
    opacity:0.25;
    animation:vortexSpin 8s linear infinite;
}
@keyframes vortexSpin { from {transform:rotate(0deg);} to {transform:rotate(-360deg);} }

/* Halo */
#halo {
    position:absolute;
    right:0;
    top:10vh;
    width:50vw;
    height:10vh;
    background:radial-gradient(circle, rgba(255,255,255,0.4), transparent);
}

/* Cube */
#cube {
    position:absolute;
    right:10vw;
    top:30vh;
    width:120px;
    height:120px;
    transform-style:preserve-3d;
    animation:cubeSpin 6s linear infinite;
}
@keyframes cubeSpin { from {transform:rotateX(0deg) rotateY(0deg);} to {transform:rotateX(360deg) rotateY(360deg);} }

.face {
    position:absolute;
    width:120px;
    height:120px;
    background:#222;
    border:2px solid #6cf;
    opacity:0.8;
}
#f { background:linear-gradient(90deg, blue, white, red); transform:translateZ(60px); }
#e { background:linear-gradient(white, white), linear-gradient(red, red); transform:rotateY(90deg) translateZ(60px); }
#hh { background:#900; transform:rotateY(180deg) translateZ(60px); }

/* Scan Panel */
#scanPanel {
    position:absolute;
    left:20px;
    bottom:20px;
    width:40vw;
    background:#111;
    padding:20px;
    border:2px solid #333;
    border-radius:10px;
    max-height:40vh;
    overflow:auto;
}
.fail { color:#f33; }
.error { color:#ff0; }
.ok { color:#3f3; }
</style>
