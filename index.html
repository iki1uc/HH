<script type="module">
    import VEC from "./VEC.tor";

    // HH.respo – Semi‑Admin / Helper
    const HHrespo = {
        name: "HH.respo",
        level: "semi-admin",
        active: true,

        status() {
            return {
                PX: VEC.PX.id,
                PQ: VEC.PQ.id,
                PR: VEC.PR.id,
                channel: VEC.channel,
                time: Date.now()
            };
        },

        save(device) {
            const data = {
                id: VEC[device].id,
                channel: VEC.channel,
                time: Date.now()
            };
            localStorage.setItem(device, JSON.stringify(data));
            return `${device} gespeichert`;
        },

        load(device) {
            const data = localStorage.getItem(device);
            if (!data) return `${device} hat keinen gespeicherten Zustand`;
            return JSON.parse(data);
        },

        run(device) {
            const packet = VEC.send(VEC[device].id, "SYSTEM", "RUN");
            return VEC.recv(packet);
        }
    };

    // HH.respo Ausgabe
    window.addEventListener("DOMContentLoaded", () => {
        const box = document.getElementById("HHrespoBox");
        const st = HHrespo.status();

        box.textContent =
            "HH.respo aktiv\n" +
            "Admin-Level: " + HHrespo.level + "\n" +
            "Geräte:\n" +
            "  PX: " + st.PX + "\n" +
            "  PQ: " + st.PQ + "\n" +
            "  PR: " + st.PR + "\n" +
            "Channel: " + st.channel + "\n" +
            "Status: bereit";
    });

    // Trigger verbinden
    function HHout(text) {
        document.getElementById("HHrespoBox").textContent = text;
    }

    window.addEventListener("DOMContentLoaded", () => {
        document.getElementById("px-save").onclick = () => HHout(HHrespo.save("PX"));
        document.getElementById("px-load").onclick = () => HHout(JSON.stringify(HHrespo.load("PX"), null, 2));
        document.getElementById("px-run").onclick  = () => HHout(JSON.stringify(HHrespo.run("PX"), null, 2));

        document.getElementById("pq-save").onclick = () => HHout(HHrespo.save("PQ"));
        document.getElementById("pq-load").onclick = () => HHout(JSON.stringify(HHrespo.load("PQ"), null, 2));
        document.getElementById("pq-run").onclick  = () => HHout(JSON.stringify(HHrespo.run("PQ"), null, 2));

        document.getElementById("pr-save").onclick = () => HHout(HHrespo.save("PR"));
        document.getElementById("pr-load").onclick = () => HHout(JSON.stringify(HHrespo.load("PR"), null, 2));
        document.getElementById("pr-run").onclick  = () => HHout(JSON.stringify(HHrespo.run("PR"), null, 2));
    });
</script>
