<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HH – Host Hub Stargate</title>

<style>
body {
    background:#000;
    color:#0f0;
    font-family:Consolas, monospace;
    padding:20px;
    overflow:hidden;
}

/* Stargate – halber Bildschirm */
#gate {
    position:absolute;
    right:0;
    top:0;
    width:50vw;
    height:100vh;
    border-left:3px solid #6cf;
    background:radial-gradient(circle at center, #333, #000);
    animation:spinGate 20s linear infinite;
}

/* Rotation des Gates */
@keyframes spinGate {
    from { transform:rotate(0deg); }
    to { transform:rotate(360deg); }
}

/* Trichter-Effekt */
#vortex {
    position:absolute;
    right:0;
    top:0;
    width:50vw;
    height:100vh;
    background:conic-gradient(from 180deg, #6cf, #000);
    opacity:0.25;
    animation:vortexSpin 8s linear infinite;
}

@keyframes vortexSpin {
    from { transform:rotate(0deg); }
    to { transform:rotate(-360deg); }
}

/* Heiligenschein */
#halo {
    position:absolute;
    right:0;
    top:10vh;
    width:50vw;
    height:10vh;
    background:radial-gradient(circle, rgba(255,255,255,0.4), transparent);
}

/* Flaggen-Würfel */
#cube {
    position:absolute;
    right:10vw;
    top:30vh;
    width:120px;
    height:120px;
    transform-style:preserve-3d;
    animation:cubeSpin 6s linear infinite;
}

@keyframes cubeSpin {
    from { transform:rotateX(0deg) rotateY(0deg); }
    to { transform:rotateX(360deg) rotateY(360deg); }
}

.face {
    position:absolute;
    width:120px;
    height:120px;
    background:#222;
    border:2px solid #6cf;
    opacity:0.8;
}

/* Frankreich */
#f { background:linear-gradient(90deg, blue, white, red); transform:translateZ(60px); }

/* England */
#e { background:linear-gradient(white, white), linear-gradient(red, red); transform:rotateY(90deg) translateZ(60px); }

/* HH-Wappen */
#hh { background:#900; transform:rotateY(180deg) translateZ(60px); }

/* Host Hub Text */
#hub {
    position:absolute;
    left:20px;
    top:20px;
}
</style>
</head>

<body>

<div id="hub">
    <h1>HH – Host Hub</h1>
    <p>Stargate‑Visitenkarte aktiv.</p>
</div>

<div id="gate"></div>
<div id="vortex"></div>
<div id="halo"></div>

<div id="cube">
    <div id="f" class="face"></div>
    <div id="e" class="face"></div>
    <div id="hh" class="face"></div>
</div>

</body>
</html>
